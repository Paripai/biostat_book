name: Test Render (no publish)

# Runs on pull requests and on-demand, so you can verify the book builds
# BEFORE merging to main. Nothing is published by this workflow.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/*.qmd') }}
          restore-keys: ${{ runner.os }}-r-

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(c(
            "knitr", "rmarkdown", "kableExtra",
            "ggplot2", "dplyr", "patchwork", "ragg"
          ))

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        run: quarto install tinytex --update-path

      # HTML first: fast, and proves the R code in every chapter runs
      - name: Render HTML
        run: quarto render --to html

      # PDF second: this is the step that has been failing
      - name: Render PDF
        run: quarto render --to pdf

      # If the PDF fails, upload the LaTeX log so the exact failing line
      # can be inspected without guessing
      - name: Upload LaTeX log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-debug-logs
          path: |
            index.log
            index.tex
          if-no-files-found: warn

      - name: Upload built book
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: book-preview
          path: _book/
