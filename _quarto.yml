project:
  type: book

knitr:
  opts_chunk:
    dev: "ragg_png"

book:
  title: "Introduction to Biostatistics"
  subtitle: "208141"
  author: "Parichart Pattarapanitchai"
  downloads: [pdf]
  date: "today"
  chapters:
    - index.qmd
    - chapter01_data_in_health_science.qmd
    - chapter02_data_summarization.qmd
    - chapter03_probability_distribution.qmd
    - chapter04_estimation.qmd
    - chapter05_statistical_testing.qmd
    - chapter06_statistical_modeling.qmd

format:
  html:
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    theme: cosmo
    highlight-style: github
    number-sections: false
    fig-width: 8
    fig-height: 5
  pdf:
    pdf-engine: xelatex
    documentclass: scrreprt
    toc: true
    number-sections: false
    geometry: margin=1in
    fontsize: 12pt

execute:
  echo: false
  warning: false
  message: false
